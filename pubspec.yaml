name: afro_ludo_flutter
description: "Afro Ludo - African board games for Android"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # AdMob
  google_mobile_ads: ^5.1.0

  # State management
  flutter_riverpod: ^2.6.1

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Audio
  audioplayers: ^6.1.0

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0

  # Crash reporting
  firebase_core: ^3.8.0
  firebase_crashlytics: ^4.2.0

  # Connectivity
  connectivity_plus: ^6.1.0

  # Navigation
  go_router: ^14.6.3

  # In-app purchase
  in_app_purchase: ^3.2.0

  # Sharing
  url_launcher: ^6.3.1
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Mocking
  mocktail: ^1.0.4

  # Integration testing
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true

  generate: true

  assets:
    - assets/audio/sfx/
    - assets/audio/sfx/dice_roll.mp3
    - assets/audio/sfx/piece_move.mp3
    - assets/audio/sfx/piece_capture.mp3
    - assets/audio/sfx/piece_home.mp3
    - assets/audio/sfx/win.mp3
    - assets/audio/sfx/button_click.mp3
